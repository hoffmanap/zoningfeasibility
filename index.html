<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Paso Site Feasibility Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --accent: #f59e0b;
            --success: #10b981;
            --warning: #ef4444;
            --bg-dark: #0f172a;
            --bg-light: #f8fafc;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a2744 100%);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        h1 {
            font-size: 3em;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 400;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 2fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 1400px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .section {
            margin-bottom: 30px;
        }

        .section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent);
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-size: 0.95em;
        }

        select, input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 1em;
            transition: all 0.2s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95em;
        }

        .btn-primary {
            background: var(--primary-light);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-dark);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: var(--warning);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .unit-card {
            background: var(--bg-light);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid var(--primary-light);
        }

        .unit-card h4 {
            color: var(--primary);
            margin-bottom: 12px;
            font-size: 1.05em;
        }

        .unit-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.95em;
            margin-bottom: 12px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
        }

        .detail-label {
            color: var(--text-light);
            font-weight: 500;
        }

        .detail-value {
            font-weight: 600;
            color: var(--text-dark);
        }

        /* Dashboard Styles */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 1000px) {
            .dashboard {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .metric {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            border-top: 4px solid var(--primary-light);
        }

        .metric-label {
            color: var(--text-light);
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metric-value {
            font-size: 2.5em;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Space Mono', monospace;
            margin-bottom: 5px;
        }

        .metric-unit {
            font-size: 0.85em;
            color: var(--text-light);
        }

        .metric.success {
            border-top-color: var(--success);
        }

        .metric.success .metric-value {
            color: var(--success);
        }

        .metric.warning {
            border-top-color: var(--warning);
        }

        .metric.warning .metric-value {
            color: var(--warning);
        }

        /* Constraints Visualization */
        .constraints-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .constraints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .constraint-card {
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }

        .constraint-card.active {
            border-color: var(--primary-light);
            background: rgba(59, 130, 246, 0.05);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.15);
        }

        .constraint-card h4 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.1em;
        }

        .constraint-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95em;
        }

        .constraint-item:last-child {
            border-bottom: none;
        }

        .constraint-label {
            color: var(--text-light);
            font-weight: 500;
        }

        .constraint-value {
            font-family: 'Space Mono', monospace;
            font-weight: 600;
            color: var(--text-dark);
        }

        /* Feasibility Check */
        .feasibility-check {
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
            text-align: center;
        }

        .feasibility-check.feasible {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
            border: 2px solid var(--success);
        }

        .feasibility-check.infeasible {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
            border: 2px solid var(--warning);
        }

        .feasibility-icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .feasibility-text {
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .feasibility-check.feasible .feasibility-text {
            color: var(--success);
        }

        .feasibility-check.infeasible .feasibility-text {
            color: var(--warning);
        }

        .feasibility-details {
            color: var(--text-light);
            margin-top: 15px;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .issue-list {
            text-align: left;
            display: inline-block;
            margin-top: 15px;
        }

        .issue-item {
            padding: 8px 12px;
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid var(--warning);
            margin-bottom: 8px;
            border-radius: 4px;
            color: var(--text-dark);
        }

        .small-text {
            font-size: 0.85em;
            color: var(--text-light);
            margin-top: 10px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.2s;
            font-family: inherit;
            font-size: 0.95em;
        }

        .tab-btn.active {
            color: var(--primary-light);
            border-bottom-color: var(--primary-light);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .parking-calc {
            background: var(--bg-light);
            padding: 20px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .calc-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95em;
        }

        .calc-row:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 1.05em;
            color: var(--primary);
        }

        /* 3D Visualization */
        #canvas3d {
            width: 100%;
            height: 600px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }

        .visualization-container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .viz-title {
            font-size: 1.3em;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .viz-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent);
            border-radius: 2px;
        }

        .viz-legend {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .legend-building {
            background: #3b82f6;
        }

        .legend-parking {
            background: #f59e0b;
        }

        .legend-ground {
            background: #cbd5e1;
        }

        /* Yield Comparison */
        .comparison-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .yield-card {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.05), rgba(59, 130, 246, 0.02));
            border: 2px solid var(--primary-light);
            border-radius: 10px;
            padding: 20px;
        }

        .yield-card h4 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 1.05em;
            text-align: center;
        }

        .yield-metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            font-size: 0.95em;
        }

        .yield-metric:last-child {
            border-bottom: none;
        }

        .yield-label {
            color: var(--text-light);
            font-weight: 500;
        }

        .yield-value {
            font-weight: 700;
            font-family: 'Space Mono', monospace;
            color: var(--primary);
        }

        .yield-reduction {
            color: var(--warning);
            font-weight: 700;
        }

        .constraint-breakdown {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .constraint-breakdown h3 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .constraint-breakdown h3::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent);
            border-radius: 2px;
        }

        .constraint-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .constraint-item-box {
            background: var(--bg-light);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            transition: all 0.2s;
        }

        .constraint-item-box:hover {
            border-color: var(--primary-light);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.1);
        }

        .constraint-item-box h5 {
            color: var(--primary);
            font-size: 0.95em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .constraint-item-value {
            font-size: 1.8em;
            font-weight: 700;
            color: var(--primary);
            font-family: 'Space Mono', monospace;
            margin-bottom: 5px;
        }

        .constraint-item-unit {
            font-size: 0.85em;
            color: var(--text-light);
        }

        .area-breakdown {
            margin-top: 20px;
            background: var(--bg-light);
            border-radius: 8px;
            padding: 20px;
        }

        .area-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95em;
        }

        .area-item:last-child {
            border-bottom: none;
            font-weight: 700;
            font-size: 1.05em;
            color: var(--primary);
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid var(--border);
        }

        .area-name {
            font-weight: 600;
            color: var(--text-dark);
        }

        .area-sq {
            font-family: 'Space Mono', monospace;
            font-weight: 600;
        }

        .area-pct {
            font-size: 0.85em;
            color: var(--text-light);
            margin-left: 10px;
        }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Site Feasibility</h1>
            <p class="subtitle">El Paso Zoning Compliance Tool</p>
        </header>

        <div class="main-grid">
            <!-- LEFT PANEL: INPUTS -->
            <div class="panel">
                <div class="section">
                    <div class="section-title">Site Parameters</div>
                    
                    <div class="form-group">
                        <label for="zoning">Zoning District</label>
                        <select id="zoning" onchange="updateZoning()">
                            <option value="">Select a zone...</option>
                            <option value="R-4">R-4</option>
                            <option value="R-5">R-5</option>
                            <option value="A-1">A-1</option>
                            <option value="A-2">A-2</option>
                            <option value="A-3">A-3</option>
                            <option value="A-4">A-4</option>
                            <option value="A-0">A-0</option>
                            <option value="A-3/O">A-3/O</option>
                            <option value="A-M">A-M</option>
                            <option value="COP">COP</option>
                            <option value="C-1">C-1</option>
                            <option value="C-2">C-2</option>
                            <option value="C-3">C-3</option>
                            <option value="C-4">C-4</option>
                            <option value="C-5">C-5</option>
                            <option value="PMD">PMD</option>
                            <option value="S-D">S-D</option>
                            <option value="U-P">U-P</option>
                            <option value="P-R I">P-R I</option>
                            <option value="P-R II">P-R II</option>
                            <option value="P-C">P-C</option>
                            <option value="SRR">SRR</option>
                            <option value="R-MU">R-MU</option>
                            <option value="G-MU">G-MU</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="proposedUse">Proposed Use</label>
                        <select id="proposedUse" onchange="updateCalculations()">
                            <option value="">Select a use...</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <div class="form-group">
                            <label for="lotWidth">Lot Width (ft)</label>
                            <input type="number" id="lotWidth" value="150" min="1" onchange="updateCalculations()">
                        </div>
                        <div class="form-group">
                            <label for="lotDepth">Lot Depth (ft)</label>
                            <input type="number" id="lotDepth" value="200" min="1" onchange="updateCalculations()">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="parkingAngle">Parking Configuration</label>
                        <select id="parkingAngle" onchange="updateCalculations()">
                            <option value="">Select angle...</option>
                            <option value="45">45°</option>
                            <option value="60">60°</option>
                            <option value="75">75°</option>
                            <option value="90">90°</option>
                        </select>
                    </div>
                </div>

                <div class="section">
                    <div class="section-title">Building Program</div>
                    
                    <div class="input-group">
                        <div class="form-group">
                            <label for="unitCount">Number of Units</label>
                            <input type="number" id="unitCount" value="20" min="1" max="500" onchange="updateCalculations()">
                        </div>
                        <div class="form-group">
                            <label for="floors">Number of Floors</label>
                            <input type="number" id="floors" value="3" min="1" max="30" onchange="updateCalculations()">
                        </div>
                    </div>

                    <div class="input-group">
                        <div class="form-group">
                            <label for="bedrooms">Bedrooms</label>
                            <select id="bedrooms" onchange="updateCalculations()">
                                <option value="0">Studio</option>
                                <option value="1" selected>1 BR</option>
                                <option value="2">2 BR</option>
                                <option value="3">3 BR</option>
                                <option value="4">4+ BR</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="bathrooms">Bathrooms</label>
                            <select id="bathrooms" onchange="updateCalculations()">
                                <option value="1" selected>1 BA</option>
                                <option value="1.5">1.5 BA</option>
                                <option value="2">2 BA</option>
                                <option value="2.5">2.5 BA</option>
                                <option value="3">3 BA</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="unitSize">Unit Size (SF)</label>
                        <input type="number" id="unitSize" value="850" min="300" onchange="updateCalculations()">
                    </div>
                </div>

                <div class="section">
                    <div class="button-group">
                        <button class="btn-primary" onclick="updateCalculations()">Calculate</button>
                        <button class="btn-secondary" onclick="resetForm()">Reset</button>
                    </div>
                </div>
            </div>

            <!-- CENTER PANEL: 3D VISUALIZATION -->
            <div class="visualization-container">
                <div class="viz-title">3D Site Model</div>
                <canvas id="canvas3d"></canvas>
                <div class="viz-legend">
                    <div class="legend-item">
                        <div class="legend-color legend-building"></div>
                        <span>Building</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color legend-parking"></div>
                        <span>Parking</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-color legend-ground"></div>
                        <span>Ground</span>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL: METRICS & ANALYSIS -->
            <div>
                <div class="dashboard" id="dashboard"></div>
                
                <div class="constraints-section">
                    <div class="section-title">Zoning Constraints</div>
                    <div class="constraints-grid" id="constraintsGrid"></div>
                </div>

                <div class="feasibility-check" id="feasibilityCheck"></div>
            </div>
        </div>

        <!-- DETAILED ANALYSIS -->
        <div class="constraints-section">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('parking')">Parking Analysis</button>
                <button class="tab-btn" onclick="switchTab('yield')">Yield Analysis</button>
                <button class="tab-btn" onclick="switchTab('details')">Site Details</button>
            </div>

            <div id="parking" class="tab-content active">
                <div id="parkingCalc"></div>
            </div>

            <div id="yield" class="tab-content">
                <div id="yieldAnalysis"></div>
            </div>

            <div id="details" class="tab-content">
                <div id="siteDetails"></div>
            </div>
        </div>
    </div>

    <script>
        // El Paso Zoning Districts with all constraints - from Title 20 Appendix B
        const zoningDistricts = {
            'R-4': { 
                name: 'R-4', 
                maxHeight: 35, 
                maxFAR: 0.35, 
                minLotSize: 7000,
                frontSetback: 10,
                sideSetback: 5,
                rearSetback: 10,
                openSpaceRequired: 0.25,
                parkingPerUnit: 2,
                maxCoverage: 0.35,
                permitUses: ['Two-family dwelling (Duplex)']
            },
            'R-5': { 
                name: 'R-5', 
                maxHeight: 35, 
                maxFAR: 0.40, 
                minLotSize: 6000,
                frontSetback: 10,
                sideSetback: 5,
                rearSetback: 10,
                openSpaceRequired: 0.25,
                parkingPerUnit: 1.5,
                maxCoverage: 0.40,
                permitUses: ['Two-family dwelling (Duplex)']
            },
            'A-1': { 
                name: 'A-1',

        function initThreeJS() {
            const canvas = document.getElementById('canvas3d');
            
            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1e293b);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
            camera.position.set(250, 150, 250);
            camera.lookAt(0, 0, 0);
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(canvas.clientWidth, canvas.clientHeight);
            renderer.shadowMap.enabled = true;
            
            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(100, 100, 100);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);
            
            // Ground reference
            const groundGeometry = new THREE.BoxGeometry(400, 1, 400);
            const groundMaterial = new THREE.MeshStandardMaterial({ color: 0xcbd5e1 });
            groundMesh = new THREE.Mesh(groundGeometry, groundMaterial);
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);
            
            // Initial render
            animate();
        }

        function updateThreeJS(lotWidth, lotDepth, floors, unitCount, bedrooms) {
            // Remove old meshes
            if (buildingMesh) scene.remove(buildingMesh);
            if (parkingMesh) scene.remove(parkingMesh);
            
            const unitSize = parseFloat(document.getElementById('unitSize').value) || 850;
            const totalBuildingArea = unitCount * unitSize;
            const floorAreaPerFloor = totalBuildingArea / floors;
            const footprintArea = floorAreaPerFloor;
            
            // Calculate building footprint dimensions (approximate square)
            const footprintDim = Math.sqrt(footprintArea);
            const buildingWidth = Math.min(footprintDim, lotWidth * 0.8);
            const buildingDepth = Math.min(footprintDim, lotDepth * 0.8);
            const floorHeight = 12; // 12 feet per floor
            const buildingHeight = floors * floorHeight;
            
            // Building
            const buildingGeometry = new THREE.BoxGeometry(buildingWidth, buildingHeight, buildingDepth);
            const buildingMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x3b82f6,
                metalness: 0.3,
                roughness: 0.4
            });
            buildingMesh = new THREE.Mesh(buildingGeometry, buildingMaterial);
            buildingMesh.position.y = buildingHeight / 2;
            buildingMesh.castShadow = true;
            buildingMesh.receiveShadow = true;
            scene.add(buildingMesh);
            
            // Parking area
            const parkingAngle = document.getElementById('parkingAngle').value;
            const spec = parkingSpecs[parkingAngle];
            
            if (spec) {
                const parkingSpaces = unitCount * parkingRequirements[bedrooms];
                const stallDepthFt = spec.stallDepth.feet + (spec.stallDepth.inches / 12);
                const aisleWidthFt = spec.aisleWidth.feet + (spec.aisleWidth.inches / 12);
                
                // Parking layout
                const spaceArea = 9 * stallDepthFt;
                const totalParkingArea = spaceArea * parkingSpaces * 1.3;
                
                const parkingWidth = Math.min(Math.sqrt(totalParkingArea), lotWidth * 0.9);
                const parkingDepth = totalParkingArea / parkingWidth;
                
                const parkingGeometry = new THREE.BoxGeometry(parkingWidth, 0.2, parkingDepth);
                const parkingMaterial = new THREE.MeshStandardMaterial({ 
                    color: 0xf59e0b,
                    metalness: 0.2,
                    roughness: 0.5
                });
                parkingMesh = new THREE.Mesh(parkingGeometry, parkingMaterial);
                parkingMesh.position.z = (parkingDepth - buildingDepth) / 2 - buildingDepth / 2;
                parkingMesh.receiveShadow = true;
                scene.add(parkingMesh);
            }
            
            // Update camera to fit scene
            const maxDim = Math.max(lotWidth, lotDepth, buildingHeight);
            const fov = camera.fov * (Math.PI / 180);
            const height = 2 * Math.tan(fov / 2) * maxDim;
            const width = height * camera.aspect;
            camera.position.z = Math.max(width, height) / 2 * 1.3;
            camera.lookAt(0, buildingHeight / 3, 0);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // Gentle rotation
            if (buildingMesh) {
                buildingMesh.rotation.y += 0.0005;
            }
            
            renderer.render(scene, camera);
        }

        function convertToDecimal(feet, inches) {
            return feet + (inches / 12);
        }

        function formatDimension(feet, inches) {
            return `${feet}' ${inches}"`;
        }

        function updateZoning() {
            const zoning = document.getElementById('zoning').value;
            const useSelect = document.getElementById('proposedUse');
            
            // Clear the use dropdown
            useSelect.innerHTML = '<option value="">Select a use...</option>';
            
            if (zoning) {

                    // Populate with permitted uses for this zone
                    zoneInfo.permitUses.forEach(use => {
                        const option = document.createElement('option');
                        option.value = use;
                        option.textContent = use;
                        useSelect.appendChild(option);
                    });
                }
                useSelect.disabled = false;
                updateCalculations();
            } else {
                useSelect.disabled = true;
            }
        }

        function updateCalculations() {
            const zoning = document.getElementById('zoning').value;
            const proposedUse = document.getElementById('proposedUse').value;
            const parkingAngle = document.getElementById('parkingAngle').value;
            const lotWidth = parseFloat(document.getElementById('lotWidth').value) || 0;
            const lotDepth = parseFloat(document.getElementById('lotDepth').value) || 0;
            const unitCount = parseInt(document.getElementById('unitCount').value) || 0;
            const unitSize = parseFloat(document.getElementById('unitSize').value) || 0;
            const floors = parseInt(document.getElementById('floors').value) || 1;
            const bedrooms = document.getElementById('bedrooms').value;

            if (!zoning) {
                alert('Please select a zoning district');
                return;
            }

            if (!proposedUse) {
                alert('Please select a proposed use');
                return;
            }

            if (!parkingAngle) {
                alert('Please select a parking configuration');
                return;
            }

            const zoneInfo = zoningDistricts[zoning];
            const parkingSpec = parkingSpecs[parkingAngle];
            const lotArea = lotWidth * lotDepth;
            const totalBuildingArea = unitCount * unitSize;
            const fsr = totalBuildingArea / lotArea;
            const buildingHeight = floors * 12;
            
            // Parking calculation - use zone-specific parking requirement
            const parkingSpaces = unitCount * zoneInfo.parkingPerUnit;
            const stallDepthDecimal = convertToDecimal(parkingSpec.stallDepth.feet, parkingSpec.stallDepth.inches);
            const aisleWidthDecimal = convertToDecimal(parkingSpec.aisleWidth.feet, parkingSpec.aisleWidth.inches);
            
            const spaceArea = 9 * stallDepthDecimal;
            const totalParkingArea = spaceArea * parkingSpaces * 1.3;

            // Calculate feasibility
            let feasible = true;
            let issues = [];

            // Check zoning height limit
            if (buildingHeight > zoneInfo.maxHeight) {
                feasible = false;
                issues.push(`Building height of ${buildingHeight}' exceeds ${zoning} limit of ${zoneInfo.maxHeight}'`);
            }

            // Check Floor Area Ratio
            if (fsr > zoneInfo.maxFAR) {
                feasible = false;
                issues.push(`FSR of ${fsr.toFixed(2)} exceeds ${zoning} limit of ${zoneInfo.maxFAR}`);
            }

            // Check site coverage
            const buildingCoverage = totalBuildingArea / lotArea;
            if (buildingCoverage > 0.6) {
                issues.push(`Building footprint ${(buildingCoverage * 100).toFixed(1)}% may require additional setbacks`);
            }

            // Check parking feasibility
            const totalAreaNeeded = totalBuildingArea + totalParkingArea;
            if (totalAreaNeeded > lotArea * 1.5) {
                feasible = false;
                issues.push(`Site is too small for ${Math.round(parkingSpaces)} parking spaces + ${unitCount} units`);
            }

            // Check minimum lot size
            if (lotArea < zoneInfo.minLotSize) {
                issues.push(`Lot size of ${(lotArea / 1000).toFixed(1)}k SF is below recommended minimum of ${(zoneInfo.minLotSize / 1000).toFixed(1)}k SF`);
            }

            // Render dashboard
            renderDashboard(lotArea, totalBuildingArea, fsr, parkingSpaces, totalParkingArea, buildingHeight, floors);
            
            // Render constraints
            renderConstraints(zoneInfo, parkingSpec, parkingAngle);
            
            // Render feasibility
            renderFeasibility(feasible, issues, totalAreaNeeded, lotArea);
            
            // Render parking calc
            renderParkingCalc(parkingSpaces, stallDepthDecimal, aisleWidthDecimal, parkingSpec, zoneInfo);
            
            // Render yield analysis
            const yieldData = calculateYield(lotWidth, lotDepth, zoneInfo);
            renderYieldAnalysis(yieldData, zoneInfo);
            
            // Render site details
            renderSiteDetails(lotWidth, lotDepth, lotArea, unitCount, unitSize, totalBuildingArea, floors);

            // Update 3D visualization
            updateThreeJS(lotWidth, lotDepth, floors, unitCount, bedrooms);
        }

        function calculateYield(lotWidth, lotDepth, zoneInfo) {
            const lotArea = lotWidth * lotDepth;
            
            // THEORETICAL MAXIMUM (based on zoning)
            const maxBuildingAreaByFAR = lotArea * zoneInfo.maxFAR;
            const maxBuildingAreaByCoverage = lotArea * zoneInfo.maxCoverage;
            const maxBuildingArea = Math.min(maxBuildingAreaByFAR, maxBuildingAreaByCoverage);
            
            // Assume average unit size of 850 SF for theoretical calculation
            const avgUnitSize = 850;
            const theoreticalMaxUnits = Math.floor(maxBuildingArea / avgUnitSize);
            
            // ACTUAL YIELD (constrained by setbacks, parking, open space)
            const frontSetbackArea = (lotWidth * zoneInfo.frontSetback);
            const rearSetbackArea = (lotWidth * zoneInfo.rearSetback);
            const sideSetbackArea = (2 * lotDepth * zoneInfo.sideSetback);
            
            const totalSetbackArea = frontSetbackArea + rearSetbackArea + sideSetbackArea;
            const buildableArea = lotArea - totalSetbackArea;
            
            // Open space requirement
            const openSpaceArea = lotArea * zoneInfo.openSpaceRequired;
            const availableForDevelopment = buildableArea - openSpaceArea;
            
            // Parking requirement (1 unit needs parking)
            const theoreticalParking = theoreticalMaxUnits * zoneInfo.parkingPerUnit;
            const stallDepth = 19.5; // average parking stall depth
            const parkingSpaceArea = 9 * stallDepth;
            const parkingWithCirculation = theoreticalParking * parkingSpaceArea * 1.3;
            
            // Building footprint available after parking
            const buildingFootprint = Math.min(
                availableForDevelopment - parkingWithCirculation,
                availableForDevelopment * 0.6
            );
            
            // Actual units that can fit
            const actualMaxUnits = Math.floor(buildingFootprint / avgUnitSize);
            
            return {
                lotArea,
                theoreticalMaxUnits,
                theoreticalMaxArea: maxBuildingArea,
                buildableArea,
                setbackArea: totalSetbackArea,
                openSpaceArea,
                availableForDevelopment,
                parkingRequired: theoreticalParking,
                parkingAreaRequired: parkingWithCirculation,
                buildingFootprint,
                actualMaxUnits,
                loss: theoreticalMaxUnits - actualMaxUnits,
                lossPercentage: ((theoreticalMaxUnits - actualMaxUnits) / theoreticalMaxUnits * 100)
            };
        }
